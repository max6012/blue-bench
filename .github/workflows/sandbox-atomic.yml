name: sandbox-atomic-capture

# Manually-triggered workflow that runs an Atomic Red Team technique
# on an ephemeral windows-latest runner and uploads the captured
# EVTX / Sysmon / PowerShell telemetry as a workflow artifact.
#
# Trigger from the operator's Mac via:
#   gh workflow run sandbox-atomic.yml -f technique=T1059.001 -f test_numbers=1
#
# Or via the orchestrator wrapper:
#   ./sandbox/orchestrator/trigger-capture.sh T1059.001 -TestNumbers 1
#
# Downstream:
#   ./sandbox/orchestrator/harvest-from-run.sh <run_id>
#   ./sandbox/tests/test_t1059_001_end_to_end.sh   # acceptance

on:
  workflow_dispatch:
    inputs:
      technique:
        description: 'ATT&CK technique number (e.g. T1059.001)'
        required: true
        type: string
      test_numbers:
        description: 'Atomic Red Team TestNumbers (comma-separated)'
        required: true
        default: '1'
        type: string
      retention_days:
        description: 'Artifact retention in days'
        required: false
        default: '30'
        type: string
      input_args:
        description: 'Invoke-AtomicTest -InputArgs (hashtable literal, e.g. "@{ domain = ''127.0.0.1:8000''; port = 8000 }"). Empty = use atomic defaults.'
        required: false
        default: ''
        type: string
      start_local_listener:
        description: 'Start a Python http.server on the runner before the atomic. Required for T1071.001/T1041 when input_args pins the destination to 127.0.0.1.'
        required: false
        default: false
        type: boolean
      listener_port:
        description: 'TCP port for the local listener (only used when start_local_listener=true).'
        required: false
        default: '8000'
        type: string

permissions:
  contents: read

jobs:
  capture:
    name: ${{ inputs.technique }} (tests ${{ inputs.test_numbers }})
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Stamp run_id
        id: stamp
        shell: pwsh
        run: |
          $now = (Get-Date).ToUniversalTime().ToString('yyyyMMddTHHmmssZ')
          $rand = -join ((97..122) + (48..57) | Get-Random -Count 6 | ForEach-Object {[char]$_})
          $rid  = "$now-${{ inputs.technique }}-$rand"
          "run_id=$rid" >> $env:GITHUB_OUTPUT
          Write-Host "run_id=$rid"

      - name: Pre-flight context (egress is real internet)
        shell: pwsh
        run: |
          Write-Host '----------------------------------------------------'
          Write-Host 'GHA runner has full internet egress -- NOT isolated.'
          Write-Host 'Techniques with active network behaviour MUST pin'
          Write-Host 'destinations to loopback / RFC1918 via Invoke-AtomicTest'
          Write-Host '--input-args. See sandbox/atomics/<technique>.yaml.'
          Write-Host '----------------------------------------------------'

      - name: 01 - Disable Defender
        shell: pwsh
        run: ./sandbox/workflow/01-disable-defender.ps1

      - name: 02 - Install Sysmon
        shell: pwsh
        run: ./sandbox/workflow/02-install-sysmon.ps1

      - name: 03 - Enable EventLog channels
        shell: pwsh
        run: ./sandbox/workflow/03-enable-eventlog.ps1

      - name: 04 - Install Atomic Red Team
        shell: pwsh
        run: ./sandbox/workflow/04-install-atomic-red-team.ps1

      - name: 04b - Start local listener (optional)
        if: inputs.start_local_listener == true
        shell: pwsh
        run: |
          # Background a small Python http.server so network atomics
          # (T1071.001 / T1041) can pin their destination to
          # 127.0.0.1:<listener_port> instead of egressing to the
          # real internet. Beacons + exfil land in the listener's
          # in-memory log; the listener exits when the runner is
          # torn down.
          $port = '${{ inputs.listener_port }}'
          Write-Host "Starting Python http.server on 127.0.0.1:$port (background)..."
          $listenerLog = Join-Path $env:RUNNER_TEMP "listener-$port.log"
          Start-Process -FilePath 'python' `
                        -ArgumentList @('-m','http.server',$port,'--bind','127.0.0.1') `
                        -RedirectStandardOutput $listenerLog `
                        -RedirectStandardError "$listenerLog.err" `
                        -NoNewWindow `
                        -PassThru | Out-Null
          # Give the server a beat to bind.
          Start-Sleep -Seconds 2
          # Verify it's listening (curl returns 200 + index.html-ish).
          try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:$port/" -UseBasicParsing -TimeoutSec 5
              Write-Host "OK: local listener responding (HTTP $($r.StatusCode))."
          } catch {
              Write-Error "Local listener at 127.0.0.1:$port not responding: $($_.Exception.Message)"
              exit 1
          }

      - name: 05 - Run atomic
        shell: pwsh
        env:
          # Pass workflow inputs via env vars instead of ${{ }}
          # interpolation. Interpolation pastes the raw input text into
          # the script body, which breaks immediately when the input
          # contains single quotes (PS hashtable literals like
          # `@{ domain = '127.0.0.1:8000' }` always do). The env-var
          # path is whitespace + quote safe.
          TECH: ${{ inputs.technique }}
          TNSTR: ${{ inputs.test_numbers }}
          INPUT_ARGS: ${{ inputs.input_args }}
        run: |
          $tech = $env:TECH
          $tnStr = $env:TNSTR
          $tn = $tnStr.Split(',') | ForEach-Object { [int]$_.Trim() }
          $inputArgsLiteral = ($env:INPUT_ARGS).Trim()

          Import-Module C:\AtomicRedTeam\invoke-atomicredteam\Invoke-AtomicRedTeam.psd1 -Force
          $env:PSAtomicsFolder = 'C:\AtomicRedTeam\atomics'

          # Build the optional -InputArgs splat. When the workflow input
          # is empty (the common case) the hashtable stays empty and the
          # atomic uses its built-in defaults. When non-empty, we
          # evaluate the literal as a hashtable expression -- the
          # workflow input format is intentionally PS-native so the
          # operator's intent is unambiguous on the wire.
          $extra = @{}
          if ($inputArgsLiteral) {
              try {
                  $extra['InputArgs'] = Invoke-Expression $inputArgsLiteral
                  Write-Host "InputArgs: $($extra['InputArgs'] | ConvertTo-Json -Compress)"
              } catch {
                  Write-Error "Failed to parse input_args literal as a PowerShell hashtable: $($_.Exception.Message)"
                  exit 1
              }
          }

          # GetPrereqs first; this may download binary deps to
          # C:\AtomicRedTeam\ExternalPayloads (the runner has internet,
          # so the prereq fetch works without out-of-band staging).
          Write-Host "Fetching prereqs for $tech tests $($tn -join ',')..."
          Invoke-AtomicTest $tech -TestNumbers $tn -GetPrereqs `
                            -PathToAtomicsFolder 'C:\AtomicRedTeam\atomics' @extra

          Write-Host "Running $tech tests $($tn -join ',')..."
          Invoke-AtomicTest $tech -TestNumbers $tn `
                            -PathToAtomicsFolder 'C:\AtomicRedTeam\atomics' @extra

      - name: 06 - Flush wait
        shell: pwsh
        run: |
          Write-Host 'Waiting 30s for Sysmon + EventLog to flush...'
          Start-Sleep -Seconds 30

      - name: 07 - Harvest captured telemetry
        shell: pwsh
        run: ./sandbox/workflow/harvest.ps1 -RunId '${{ steps.stamp.outputs.run_id }}'

      - name: Upload capture as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-capture-${{ steps.stamp.outputs.run_id }}
          path: harvest/
          retention-days: ${{ fromJSON(inputs.retention_days) }}
          if-no-files-found: error

      - name: Summary
        shell: pwsh
        run: |
          $rid = '${{ steps.stamp.outputs.run_id }}'
          Write-Host ''
          Write-Host "ACCEPTANCE OK: run_id=$rid"
          Write-Host "Artifact:      sandbox-capture-$rid"
          Write-Host "Download via:  gh run download $env:GITHUB_RUN_ID -n sandbox-capture-$rid"
