id: p1-05
category: detection_rules
title: YARA Rule for Malware
question: |
  Write a YARA rule to detect the following malware characteristics:

  - PE executable for Windows x64
  - Contains the strings "Mozilla/5.0" and "ESET-NOD32" (fake AV and user-agent strings)
  - Imports WinHTTP functions (WinHttpOpen, WinHttpConnect, WinHttpSendRequest)
  - File size between 100KB and 500KB
  - Has a section named ".enigma" (custom packer indicator)

  Include a meta section with author, description, and date.
expected_tools: []
expected_findings:
  - synonyms: ["YARA rule", "yara", "rule {", "meta:", "strings:", "condition:"]
  - synonyms: ["PE magic", "MZ header", "uint16(0) == 0x5A4D", "PE32+", "pe.is_64bit", "pe.machine == 0x8664"]
  - synonyms: ["WinHttpOpen", "WinHttpConnect", "WinHttpSendRequest", "WinHTTP", "imports"]
  - synonyms: [".enigma", "enigma section", "pe.sections", "section name"]
  - synonyms: ["filesize", "100KB", "500KB", "100 * 1024", "512 * 1024", "file size condition"]
  - synonyms: ["Mozilla/5.0", "user-agent string"]
  - synonyms: ["ESET-NOD32", "ESET", "fake AV"]
  - synonyms: ["meta", "author", "description", "date"]
pass_criteria: Produces a syntactically valid YARA rule covering PE detection, WinHTTP imports, .enigma section, file size bounds, and both required strings, with a complete meta section
tags: [detection-rules, yara, malware, phase1]
max_turns: 1
