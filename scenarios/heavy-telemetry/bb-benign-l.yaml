  duration: "432h"
  warmup: "8h"

baseline_activity:
  description: "Normal corporate workday activity over 18 days — domain auth, file share access, web browsing, dev/db server work. No attacks."
  intensity: medium
  variation: medium

observation_profile: complete

output:
  logs:
    - {format: windows}
    - {format: zeek}
    - {format: ecar}
    - {format: syslog}
    - {format: bash_history}
  destination: ./output
