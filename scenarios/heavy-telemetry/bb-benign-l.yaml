version: "1.0"
name: bb-benign-l
description: |
  Blue-Bench BENIGN baseline corpus — L (large) tier. STRESS FLOOR: data/ must
  be >= 5 GB (Blue-Bench's hard L-tier floor).
  Pure benign IT telemetry substrate: normal corporate office activity with NO
  attack storyline. Adversary signal is injected later by a separate Blue-Bench
  pipeline. Mirrors Blue-Bench enterprise topology conventions (CORP AD domain
  corp.example.invalid; Windows workstations + DC + file server + Linux servers;
  10.10 workstation / 10.20 server subnets).

  Density knobs held IDENTICAL to the S and M tiers so one MB-per-host-day
  constant predicts all tiers: intensity=medium, variation=medium, no
  suspicious_noise, identical output.logs list, single span Zeek sensor over both
  segments, persona mix, user:system ratio ~0.8, and proportional system
  composition (workstation:DC:file:Linux). Tiers differ ONLY in host count, user
  count, and window length.

  L tier: 30 systems (21 workstations, 1 DC, 1 file server, 4 Linux web/app, 3
  Linux DB), 24 users (0.8/system), 18-day window. 30 x 18 = 540 host-days.
  PROJECTED, NOT GENERATED: at ~7.8 s/host-day this scenario needs ~70 minutes
  to generate, far over the ~10-minute calibration budget, so it is sized by the
  measured scaling curve rather than generated here.
  Curve from three calibration points (S=10hd/169MB, M=45hd/670MB,
  calib3=80hd/1242MB). Per-host-day density is near-constant and FLATTENING
  (16.91 / 14.89 / 15.52 MB/hd at 10 / 45 / 80 host-days) — no continued decay.
  3-point linear fit: size_MB = 15.324 * host_days + 4.1. Pessimistic power-law
  fit (p=0.95): size_MB = 18.757 * host_days^0.9501.
  L's 540 host-days projects to ~8.1 GB (linear) / ~7.2 GB (pessimistic
  power-law), clearing the 5 GB HARD floor with large margin. Break-even density
  for 5 GB at 540 host-days is only 9.48 MB/hd, far below every observed value
  (>=14.9), so the floor cannot plausibly be missed even under decay.
  The 5 GB floor is GUARANTEED only upon eventual generation; these are
  projections with margin. See the EF-P3 deliverable scaling notes for the full
  derivation.

